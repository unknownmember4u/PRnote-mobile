<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PRnote</title>
    <style>
      html, body { 
        background-color: #0A0A0A; 
        margin: 0; 
        padding: 0;
        width: 100%;
        height: 100%;
      }
      
      #root { width: 100%; height: 100%; }
      
      /* Bootstrap splash screen - shows immediately before React loads */
      #bootstrap-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #0A0A0A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      #bootstrap-splash.hidden {
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease-out;
      }
      
      .splash-icon {
        width: 80px;
        height: 80px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 24px;
        animation: bounce 2s ease-in-out infinite;
        backdrop-filter: blur(10px);
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      
      .splash-text {
        font-family: 'Fraunces', serif;
        font-size: 28px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 12px;
        letter-spacing: 0.04em;
      }
      
      .splash-subtitle {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
    </style>
    <meta name="description" content="PRnote - A beautiful note-taking app crafted for clarity." />
    <meta name="author" content="PRnote" />

    <meta property="og:title" content="PRnote" />
    <meta property="og:description" content="A beautiful note-taking app crafted for clarity." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="bootstrap-splash">
      <div class="splash-icon">P</div>
      <div class="splash-text">PRnote</div>
      <div class="splash-subtitle">Crafted for clarity</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
